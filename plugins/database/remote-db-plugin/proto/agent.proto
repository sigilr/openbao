syntax = "proto3";

package agent;

option go_package = "github.com/openbao/openbao/plugins/database/remote-db-plugin/proto/gen";

service AgentService {
  rpc Connect(stream AgentMessage) returns (stream AgentMessage);

  // RenewCert exchanges a CSR for a fresh spoke client cert, authenticated
  // by the caller's existing mTLS client cert. The new CSR's CN must match
  // the peer cert's CN — renewal is for the same identity, not a rebind.
  rpc RenewCert(RenewCertRequest) returns (RenewCertResponse);
}

message RenewCertRequest {
  // PEM-encoded PKCS#10 CSR. The CN must equal the calling spoke's current
  // identity (i.e. the CN on its mTLS client cert).
  bytes csr_pem = 1;
  // Requested validity. Hub may cap this; 0 means use the hub default.
  int64 ttl_seconds = 2;
}

message RenewCertResponse {
  bytes cert_pem = 1;
  bytes ca_cert_pem = 2;
}

// RelayForwarding rides the hub cluster port (consts.RelayForwardingALPN) to
// route spoke traffic between hub nodes in an HA hub. It is authenticated by
// the cluster's own mTLS (the same trust domain as HTTP request forwarding),
// not by the spoke-CA. See remote-db-plugin/DESIGN.md, section "HA".
service RelayForwarding {
  // AnnounceSpokes: a node that terminates spoke streams and is NOT the active
  // node pushes its FULL local spoke set to the active node. Sent on change
  // (connect/drop), periodically (self-healing full re-announce), and
  // immediately on observing a leadership change.
  rpc AnnounceSpokes(AnnounceSpokesRequest) returns (AnnounceSpokesResponse);

  // RunCommand: the active node forwards a credential command to the node that
  // holds the spoke stream. The receiver runs its own identical local path.
  rpc RunCommand(RelayRunCommandRequest) returns (RelayRunCommandResponse);

  // SignSpokeCSR: the node holding a spoke stream forwards a renewal CSR to the
  // active node, so cert issuance stays a single-issuer authority operation.
  rpc SignSpokeCSR(RelaySignCSRRequest) returns (RelaySignCSRResponse);

  // ListSpokes: a standby forwards a relay/spokes read to the active node so the
  // operator gets the merged, cluster-wide view (local map plus registry) no
  // matter which node served the API read.
  rpc ListSpokes(RelayListSpokesRequest) returns (RelayListSpokesResponse);
}

message RelayListSpokesRequest {}

message RelayListSpokesResponse {
  repeated RelaySpokeStatus spokes = 1;
  repeated RelayHubNode hub_nodes = 2;
  int32 listener_port = 3;
  int32 stale_after_seconds = 4;
}

message RelaySpokeStatus {
  string spoke_name = 1;
  int64 connected_at_unix = 2;
  int64 last_seen_unix = 3;
  bool healthy = 4;
  int64 cert_not_after = 5;
  string node_cluster_addr = 6;
  string node_id = 7;
  bool node_is_active = 8;
}

message RelayHubNode {
  string cluster_addr = 1;
  string node_id = 2;
  bool is_active = 3;
  int32 spoke_count = 4;
}

// RelayRedirect is carried as a gRPC status detail on the FailedPrecondition a
// non-active node returns from Connect when wrong-node rejection is enabled
// (optional policy, off by default). It tells the spoke which relay endpoint to
// re-dial.
message RelayRedirect {
  string relay_endpoint = 1;
}

message AnnounceSpokesRequest {
  // node_cluster_addr is where the active node dials back to reach the
  // announcer (RunCommand). Learned from the announcement itself, so the
  // registry needs no separate peer-discovery input.
  string node_cluster_addr = 1;
  // node_id is the announcer's raft node id, for display only.
  string node_id = 2;
  // spokes is the announcer's FULL local spoke set, not a delta. A full
  // re-announce is what makes the registry idempotent and self-healing.
  repeated SpokeEntry spokes = 3;
}

message AnnounceSpokesResponse {}

message SpokeEntry {
  string spoke_name = 1;
  int64 connected_at_unix = 2;
  int64 last_seen_unix = 3;
  int64 cert_not_after = 4;
}

message RelayRunCommandRequest {
  string spoke_name = 1;
  string command = 2;
  int64 timeout_ms = 3;
}

message RelayRunCommandResponse {
  string output = 1;
  string error = 2;
}

message RelaySignCSRRequest {
  // csr_pem is the spoke's renewal CSR, PEM-encoded PKCS#10.
  bytes csr_pem = 1;
  // spoke_name is the verified peer-cert CN the holding node authenticated on
  // the spoke stream. The active node signs for this CN, not for whatever the
  // CSR claims, and rejects a mismatch.
  string spoke_name = 2;
  int64 ttl_seconds = 3;
}

message RelaySignCSRResponse {
  bytes cert_pem = 1;
  bytes ca_cert_pem = 2;
}

message AgentMessage {
  string client_name = 1;
  string target_name = 5;
  string command = 2;
  string output = 3;
  bool is_response = 4;
  // is_heartbeat marks a no-op liveness ping from the spoke. The hub uses it
  // to update last-seen-at without dispatching the message as a response.
  bool is_heartbeat = 6;
  // request_id pairs a response with its request so the hub can have many
  // in-flight calls per spoke. Empty for heartbeats and the initial
  // registration handshake.
  string request_id = 7;
  // error carries a failure message back from the spoke. Empty on success.
  // Lets the hub distinguish "spoke processed and returned this output" from
  // "spoke could not process the request" without parsing the output string.
  string error = 8;
}
